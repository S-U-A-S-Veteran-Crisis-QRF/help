name: SUAS Daily Check-in

# Runs at 15:00 UTC every day = 08:00 PT (DST) / 07:00 PST.
# Posts a single issue summarizing repo + deploy + agent activity so Jacob
# gets one email a day with everything he needs to look at.
#
# Manual trigger:
#   gh workflow run "SUAS Daily Check-in" --repo S-U-A-S-Veteran-Crisis-QRF/help
# Or via the Actions tab "Run workflow" button.

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Ensure daily-checkin label exists
        run: |
          gh label create daily-checkin \
            --color 1f6feb \
            --description "Auto-generated daily status report from .github/workflows/daily-checkin.yml" \
            --repo "$REPO" 2>/dev/null || true

      - name: Close prior open daily-checkin issues
        run: |
          for n in $(gh issue list --repo "$REPO" --label daily-checkin --state open --json number --jq '.[].number'); do
            gh issue close "$n" --repo "$REPO" --comment "Superseded by today's check-in." || true
          done

      - name: Gather status
        id: gather
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          echo "today=$today" >> "$GITHUB_OUTPUT"

          # Latest Pages deploy on main
          pages=$(gh run list --repo "$REPO" --workflow "Deploy GitHub Pages" --branch main --limit 1 \
            --json conclusion,status,createdAt,htmlUrl,headSha 2>/dev/null || echo '[]')
          echo "pages<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pages" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Open PRs
          open_prs=$(gh pr list --repo "$REPO" --state open --limit 30 \
            --json number,title,headRefName,createdAt,url,author)
          echo "open_prs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$open_prs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Open issues (excluding the daily-checkin issues themselves)
          open_issues=$(gh issue list --repo "$REPO" --state open --limit 30 \
            --json number,title,labels,createdAt,url \
            --jq '[.[] | select((.labels | map(.name) | index("daily-checkin")) | not)]')
          echo "open_issues<<EOF" >> "$GITHUB_OUTPUT"
          echo "$open_issues" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # PR activity in the last 24h on claude/* branches
          since=$(date -u -d "24 hours ago" +%Y-%m-%dT%H:%M:%SZ)
          recent_prs=$(gh pr list --repo "$REPO" --state all --limit 50 \
            --json number,title,headRefName,state,updatedAt,mergedAt,url \
            --jq "[.[] | select(.updatedAt >= \"$since\") | select(.headRefName | startswith(\"claude/\"))]")
          echo "recent_prs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$recent_prs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build report body
        env:
          TODAY: ${{ steps.gather.outputs.today }}
          PAGES_JSON: ${{ steps.gather.outputs.pages }}
          OPEN_PRS_JSON: ${{ steps.gather.outputs.open_prs }}
          OPEN_ISSUES_JSON: ${{ steps.gather.outputs.open_issues }}
          RECENT_PRS_JSON: ${{ steps.gather.outputs.recent_prs }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "# SUAS Daily Check-in — $TODAY"
            echo
            echo "> **Veterans Crisis Line: 988, press 1.** Text 838255."
            echo
            echo "_Auto-generated by \`.github/workflows/daily-checkin.yml\` at $(date -u '+%Y-%m-%d %H:%M UTC'). Replies and edits welcome._"
            echo

            echo "## Live status"
            conclusion=$(jq -r '.[0].conclusion // "unknown"' <<< "$PAGES_JSON")
            status=$(jq -r '.[0].status // "unknown"' <<< "$PAGES_JSON")
            createdAt=$(jq -r '.[0].createdAt // ""' <<< "$PAGES_JSON")
            htmlUrl=$(jq -r '.[0].htmlUrl // ""' <<< "$PAGES_JSON")
            if [ "$conclusion" = "success" ]; then
              echo "- Pages deploy on \`main\`: ✅ **green** ([last run]($htmlUrl), $createdAt)"
            elif [ "$conclusion" = "null" ] || [ "$status" = "in_progress" ]; then
              echo "- Pages deploy on \`main\`: 🟡 in progress ([last run]($htmlUrl))"
            elif [ "$conclusion" = "failure" ]; then
              echo "- Pages deploy on \`main\`: ❌ **failing** ([last run]($htmlUrl)) — fix this first."
            else
              echo "- Pages deploy on \`main\`: \`$conclusion\` ([last run]($htmlUrl))"
            fi
            echo "- Live site: https://s-u-a-s-veteran-crisis-qrf.github.io/help/"
            echo "- Director's dashboard: https://s-u-a-s-veteran-crisis-qrf.github.io/help/dashboard/"
            echo "- Projects board: https://s-u-a-s-veteran-crisis-qrf.github.io/help/projects/"
            echo

            echo "## Agent activity (last 24h)"
            n=$(jq 'length' <<< "$RECENT_PRS_JSON")
            if [ "$n" = "0" ]; then
              echo "_No agent PR activity in the last 24 hours._"
            else
              echo "| PR | What | State | Updated |"
              echo "|---|---|---|---|"
              jq -r '.[] | "| [#\(.number)](\(.url)) | \(.title) | \(if .mergedAt then "✅ merged" elif .state == "CLOSED" then "❌ closed" else "🟡 open" end) | \(.updatedAt[0:10]) |"' <<< "$RECENT_PRS_JSON"
            fi
            echo

            echo "## Open PRs"
            n=$(jq 'length' <<< "$OPEN_PRS_JSON")
            if [ "$n" = "0" ]; then
              echo "_None._ 🎉"
            else
              echo "$n open. Merge what's ready, comment on what's not."
              echo
              echo "| PR | What | Branch | Opened |"
              echo "|---|---|---|---|"
              jq -r '.[] | "| [#\(.number)](\(.url)) | \(.title) | `\(.headRefName)` | \(.createdAt[0:10]) |"' <<< "$OPEN_PRS_JSON"
            fi
            echo

            echo "## Open issues"
            n=$(jq 'length' <<< "$OPEN_ISSUES_JSON")
            if [ "$n" = "0" ]; then
              echo "_None._ 🎉"
            else
              echo "$n open."
              echo
              echo "| # | What | Labels | Opened |"
              echo "|---|---|---|---|"
              jq -r '.[] | "| [#\(.number)](\(.url)) | \(.title) | \((.labels | map(.name) | join(", "))) | \(.createdAt[0:10]) |"' <<< "$OPEN_ISSUES_JSON"
            fi
            echo

            echo "## Standing asks for Jacob"
            echo "These don't go away until done. Check off as completed."
            echo
            echo "- [ ] **Enable Pages**: Settings → Pages → Source: **GitHub Actions** ([link](https://github.com/${REPO_FULL}/settings/pages))"
            echo "- [ ] **Allow auto-merge**: Settings → Pull Requests → **Allow auto-merge** ([link](https://github.com/${REPO_FULL}/settings))"
            echo "- [ ] **Registrar DNS for suasqrf.org**: see [RUNBOOK §1](../blob/main/RUNBOOK.md#1-fix-the-domain-suasqrforg)"
            echo "- [ ] **Add ANTHROPIC_API_KEY secret** (only if you want the \`@claude\` issue bot from PR #15): Settings → Secrets and variables → Actions"
            echo
            echo "---"
            echo "_To pause these check-ins: disable the **SUAS Daily Check-in** workflow in the Actions tab. To run one now: \`Run workflow\` button on that workflow._"
          } > /tmp/body.md

      - name: Open today's check-in issue
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "SUAS Daily Check-in — ${{ steps.gather.outputs.today }}" \
            --label daily-checkin \
            --assignee jacobsterlingsilver \
            --body-file /tmp/body.md
