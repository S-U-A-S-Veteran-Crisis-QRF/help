name: SUAS Autonomous Agent

# An always-on Claude agent that lives on GitHub's servers (not anyone's PC).
# Talk to it by opening an issue or commenting "@claude ..." — it reads the
# request, does the work in the repo, and opens a pull request back.
#
# ACTIVATION (one-time, owner only):
#   1. Get a Claude API key from https://console.anthropic.com
#   2. Repo Settings -> Secrets and variables -> Actions -> New repository secret
#        Name:  ANTHROPIC_API_KEY
#        Value: (paste the key)
#   3. Merge this workflow to main.
# Until the secret exists the agent simply stays asleep — nothing breaks.

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Scope: the agent can only touch THIS repository. No access to your PC,
# Google Workspace, registrar, or anything else. This is the safe envelope.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  suas-agent:
    # Only wake up when someone explicitly calls "@claude" — so it never
    # runs (or costs anything) unless you ask it to.
    if: |
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
